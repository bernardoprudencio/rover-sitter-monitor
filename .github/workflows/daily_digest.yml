name: Rover Sitter Daily Digest

on:
  schedule:
    # 9:00 AM CET = 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      historical:
        description: 'Run historical sheet dump? (yes/no)'
        required: false
        default: 'no'

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Run email digest
        env:
          GMAIL_SENDER:   ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python3 rover_monitor.py

      - name: Append new posts to Google Sheet (daily)
        if: github.event.inputs.historical != 'yes'
        env:
          SHEET_ID:          ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          HISTORICAL_MODE:   false
        run: python3 rover_sheet_dump.py

      - name: Historical dump to Google Sheet (one-time)
        if: github.event.inputs.historical == 'yes'
        env:
          SHEET_ID:          ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          HISTORICAL_MODE:   true
        run: python3 rover_sheet_dump.py
